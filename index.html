<h1 id="title">My BEANS Website</h1>

<button onclick="changeText()">Click me for Beans</button>

<p>Clicks: <span id="count">0</span></p>
<button onclick="add()">Add Click</button>

<script>
function changeText(){
 document.getElementById("title").innerText = "You clicked!";
}

let count = 0;

function add(){
 count++;
 document.getElementById("count").innerText = count + "Beans"
}
</script>
